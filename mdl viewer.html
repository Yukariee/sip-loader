<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3D Campus Model — Holy Angel School of Caloocan, Inc.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --white:   #ffffff;
      --offwhite: #f7f6f3;
      --stone:   #e8e4dc;
      --warm:    #c9b99a;
      --ink:     #1a1714;
      --muted:   #7a7369;
      --accent:  #5a7a5e;   /* sage green — academic, natural */
      --gold:    #b8963e;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
      background: var(--offwhite);
      color: var(--ink);
    }

    /* ── LOADING SCREEN ── */
    #loader {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--offwhite);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 32px;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    #loader.hidden { opacity: 0; visibility: hidden; }

    .loader-crest {
      width: 72px; height: 72px;
      border: 2px solid var(--stone);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-text {
      text-align: center;
    }
    .loader-school {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.1rem, 2.5vw, 1.5rem);
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--ink);
      line-height: 1.3;
      max-width: 360px;
    }
    .loader-sub {
      font-size: 0.8rem;
      font-weight: 300;
      color: var(--muted);
      margin-top: 8px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .loader-bar-wrap {
      width: 200px; height: 2px;
      background: var(--stone);
      border-radius: 2px;
      overflow: hidden;
    }
    .loader-bar {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.3s ease;
      border-radius: 2px;
    }
    .loader-percent {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    /* ── MAIN VIEWER ── */
    #viewer-wrap {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
    }

    /* Top header bar */
    .top-bar {
      position: absolute; top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 18px 28px;
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(to bottom, rgba(247,246,243,0.95) 60%, transparent);
      pointer-events: none;
    }

    .school-wordmark {
      pointer-events: all;
    }
    .wordmark-label {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 3px;
    }
    .wordmark-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.95rem, 1.8vw, 1.2rem);
      font-weight: 600;
      color: var(--ink);
      letter-spacing: 0.01em;
      line-height: 1.2;
    }

    .top-bar-right {
      display: flex; align-items: center; gap: 10px;
      pointer-events: all;
    }

    .pill-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px;
      background: var(--white);
      border: 1px solid var(--stone);
      border-radius: 100px;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--ink);
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
      white-space: nowrap;
    }
    .pill-btn:hover {
      background: var(--ink);
      color: var(--white);
      border-color: var(--ink);
    }
    .pill-btn svg { flex-shrink: 0; }

    /* Canvas */
    #three-canvas {
      position: absolute; inset: 0;
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    /* Bottom info bar */
    .bottom-bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      z-index: 100;
      padding: 20px 28px;
      display: flex; align-items: flex-end; justify-content: space-between;
      background: linear-gradient(to top, rgba(247,246,243,0.92) 50%, transparent);
      pointer-events: none;
    }

    .hint-stack {
      display: flex; flex-direction: column; gap: 4px;
    }
    .hint {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 400;
    }
    .hint-key {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--white);
      border: 1px solid var(--stone);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 0.68rem;
      font-weight: 500;
      color: var(--ink);
      min-width: 28px;
    }

    .status-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px;
      background: var(--white);
      border: 1px solid var(--stone);
      border-radius: 100px;
      font-size: 0.72rem;
      color: var(--muted);
      pointer-events: all;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Error toast */
    #toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: #c0392b; color: white;
      padding: 10px 20px; border-radius: 8px;
      font-size: 0.82rem; z-index: 9999;
      opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }

    /* Fullscreen button active state */
    .pill-btn.active {
      background: var(--ink);
      color: var(--white);
      border-color: var(--ink);
    }

    /* Auto-rotate toggle active */
    #autoRotateBtn.rotating {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
  </style>
</head>
<body>

<!-- Loading Screen -->
<div id="loader">
  <div class="loader-crest"></div>
  <div class="loader-text">
    <div class="loader-school">Holy Angel School<br>of Caloocan, Inc.</div>
    <div class="loader-sub">3D Campus Viewer</div>
  </div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
    <div class="loader-bar-wrap"><div class="loader-bar" id="loaderBar"></div></div>
    <div class="loader-percent" id="loaderPercent">Loading…</div>
  </div>
</div>

<!-- Main Viewer -->
<div id="viewer-wrap">
  <canvas id="three-canvas"></canvas>

  <!-- Model loads automatically from hasc.glb -->

  <!-- Top bar -->
  <div class="top-bar">
    <div class="school-wordmark">
      <div class="wordmark-label">Campus Navigator</div>
      <div class="wordmark-name">Holy Angel School of Caloocan, Inc.</div>
    </div>
    <div class="top-bar-right">
      <button class="pill-btn" id="autoRotateBtn" onclick="toggleAutoRotate()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21.5 2v6h-6"/><path d="M21.34 15.57a10 10 0 1 1-.57-8.38"/></svg>
        Auto-Rotate
      </button>
      <button class="pill-btn" id="resetBtn" onclick="resetCamera()" title="Reset view">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
        Reset View
      </button>
      <button class="pill-btn" id="fullscreenBtn" onclick="toggleFullscreen()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" id="fsIcon"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        Fullscreen
      </button>
    </div>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <div class="hint-stack">
      <div class="hint"><span class="hint-key">Drag</span> Orbit around</div>
      <div class="hint"><span class="hint-key">Scroll</span> Zoom in / out</div>
      <div class="hint"><span class="hint-key">Right-drag</span> Pan</div>
    </div>
    <div class="status-pill">
      <div class="status-dot"></div>
      <span id="statusText">Ready — load a model to begin</span>
    </div>
  </div>
</div>

<div id="toast"></div>
<!-- No file input needed — model is served from hasc.glb -->

<!-- Three.js CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Three.js setup ──────────────────────────────────────────────────────────
const canvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf7f6f3);
scene.fog = new THREE.Fog(0xf7f6f3, 80, 300);

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
camera.position.set(20, 15, 30);

// ── Lighting ────────────────────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xfff5e0, 1.4);
sunLight.position.set(50, 80, 40);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.near = 0.5;
sunLight.shadow.camera.far = 500;
sunLight.shadow.camera.left = -80;
sunLight.shadow.camera.right = 80;
sunLight.shadow.camera.top = 80;
sunLight.shadow.camera.bottom = -80;
scene.add(sunLight);

const fillLight = new THREE.DirectionalLight(0xddeeff, 0.4);
fillLight.position.set(-30, 20, -20);
scene.add(fillLight);

// Ground plane
const groundGeo = new THREE.PlaneGeometry(500, 500);
const groundMat = new THREE.MeshLambertMaterial({ color: 0xeae7e0 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// ── Orbit Controls ──────────────────────────────────────────────────────────
let isOrbitMouseDown = false;
let isPanMouseDown = false;
let prevMouseX = 0, prevMouseY = 0;
let spherical = { theta: Math.PI / 4, phi: Math.PI / 3, radius: 50 };
let target = new THREE.Vector3(0, 0, 0);
let autoRotate = false;
let autoRotateSpeed = 0.003;
let idleTimer = null;
let modelLoaded = false;
let currentModel = null;

function updateCamera() {
  const x = target.x + spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta);
  const y = target.y + spherical.radius * Math.cos(spherical.phi);
  const z = target.z + spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta);
  camera.position.set(x, y, z);
  camera.lookAt(target);
}

canvas.addEventListener('mousedown', e => {
  if (e.button === 0) isOrbitMouseDown = true;
  if (e.button === 2) isPanMouseDown = true;
  prevMouseX = e.clientX; prevMouseY = e.clientY;
  stopAutoRotate();
  resetIdleTimer();
});

canvas.addEventListener('contextmenu', e => e.preventDefault());

window.addEventListener('mousemove', e => {
  if (!isOrbitMouseDown && !isPanMouseDown) return;
  const dx = e.clientX - prevMouseX;
  const dy = e.clientY - prevMouseY;
  prevMouseX = e.clientX; prevMouseY = e.clientY;

  if (isOrbitMouseDown) {
    spherical.theta -= dx * 0.006;
    spherical.phi = Math.max(0.08, Math.min(Math.PI * 0.85, spherical.phi - dy * 0.006));
  }
  if (isPanMouseDown) {
    const panSpeed = spherical.radius * 0.001;
    const right = new THREE.Vector3();
    right.crossVectors(camera.getWorldDirection(new THREE.Vector3()), camera.up).normalize();
    target.addScaledVector(right, -dx * panSpeed);
    target.addScaledVector(camera.up, dy * panSpeed);
  }
  updateCamera();
});

window.addEventListener('mouseup', () => { isOrbitMouseDown = false; isPanMouseDown = false; });

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  spherical.radius = Math.max(2, Math.min(300, spherical.radius * (1 + e.deltaY * 0.001)));
  updateCamera();
  stopAutoRotate();
  resetIdleTimer();
}, { passive: false });

// Touch support
let lastTouchDist = 0;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    prevMouseX = e.touches[0].clientX;
    prevMouseY = e.touches[0].clientY;
    isOrbitMouseDown = true;
  } else if (e.touches.length === 2) {
    isOrbitMouseDown = false;
    lastTouchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
  stopAutoRotate(); resetIdleTimer();
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && isOrbitMouseDown) {
    const dx = e.touches[0].clientX - prevMouseX;
    const dy = e.touches[0].clientY - prevMouseY;
    spherical.theta -= dx * 0.006;
    spherical.phi = Math.max(0.08, Math.min(Math.PI * 0.85, spherical.phi - dy * 0.006));
    prevMouseX = e.touches[0].clientX;
    prevMouseY = e.touches[0].clientY;
    updateCamera();
  } else if (e.touches.length === 2) {
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    spherical.radius = Math.max(2, Math.min(300, spherical.radius * (lastTouchDist / dist)));
    lastTouchDist = dist;
    updateCamera();
  }
}, { passive: false });
canvas.addEventListener('touchend', () => { isOrbitMouseDown = false; });

function stopAutoRotate() { autoRotate = false; document.getElementById('autoRotateBtn').classList.remove('rotating'); }
function resetIdleTimer() {
  clearTimeout(idleTimer);
  if (modelLoaded) {
    idleTimer = setTimeout(() => { autoRotate = true; document.getElementById('autoRotateBtn').classList.add('rotating'); }, 8000);
  }
}

// ── Load hasc.glb automatically ─────────────────────────────────────────────
function initGLTFLoader(callback) {
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
  s.onload = callback;
  s.onerror = () => {
    showToast('Could not load 3D engine. Check your internet connection.');
    document.getElementById('statusText').textContent = 'Failed to load viewer engine';
  };
  document.head.appendChild(s);
}

function placeModel(gltf) {
  if (currentModel) scene.remove(currentModel);

  const model = gltf.scene;
  model.traverse(child => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });

  // Auto-center and scale to fit nicely
  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const scaleFactor = 30 / maxDim;

  model.scale.setScalar(scaleFactor);
  model.position.sub(center.multiplyScalar(scaleFactor));
  model.position.y += (size.y * scaleFactor) / 2;

  scene.add(model);
  currentModel = model;
  modelLoaded = true;

  // Fit camera to model
  const scaledBox = new THREE.Box3().setFromObject(model);
  const scaledCenter = scaledBox.getCenter(new THREE.Vector3());
  const scaledSize = scaledBox.getSize(new THREE.Vector3());
  target.copy(scaledCenter);
  spherical.radius = Math.max(scaledSize.x, scaledSize.y, scaledSize.z) * 1.6;
  updateCamera();

  document.getElementById('statusText').textContent = 'HASC Campus — Use mouse to explore';
  resetIdleTimer();
}

function autoLoadModel() {
  updateLoaderProgress(20);
  document.getElementById('loaderPercent').textContent = 'Loading campus model…';

  initGLTFLoader(() => {
    updateLoaderProgress(50);
    const loader = new THREE.GLTFLoader();

    loader.load(
      'hasc.glb',
      gltf => {
        updateLoaderProgress(95);
        setTimeout(() => {
          placeModel(gltf);
          updateLoaderProgress(100);
          setTimeout(hideLoader, 400);
        }, 100);
      },
      xhr => {
        if (xhr.lengthComputable) {
          const pct = 50 + Math.round((xhr.loaded / xhr.total) * 45);
          updateLoaderProgress(pct);
          document.getElementById('loaderPercent').textContent = `Loading… ${pct}%`;
        }
      },
      err => {
        console.error('Model load error:', err);
        showToast('Could not load hasc.glb — make sure it is in the same folder as this HTML file.');
        document.getElementById('statusText').textContent = 'Model not found — place hasc.glb in the same folder';
        document.getElementById('loaderPercent').textContent = 'hasc.glb not found';
        // Still hide loader after delay
        setTimeout(hideLoader, 2500);
      }
    );
  });
}

// ── Loader UI helpers ────────────────────────────────────────────────────────
function updateLoaderProgress(pct) {
  document.getElementById('loaderBar').style.width = pct + '%';
  if (pct < 100) document.getElementById('loaderPercent').textContent = pct + '%';
}
function hideLoader() {
  document.getElementById('loader').classList.add('hidden');
}

// ── Controls ─────────────────────────────────────────────────────────────────
function toggleAutoRotate() {
  autoRotate = !autoRotate;
  document.getElementById('autoRotateBtn').classList.toggle('rotating', autoRotate);
}

function resetCamera() {
  if (currentModel) {
    const box = new THREE.Box3().setFromObject(currentModel);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    target.copy(center);
    spherical.radius = Math.max(size.x, size.y, size.z) * 1.6;
    spherical.theta = Math.PI / 4;
    spherical.phi = Math.PI / 3;
  } else {
    spherical = { theta: Math.PI / 4, phi: Math.PI / 3, radius: 50 };
    target.set(0, 0, 0);
  }
  updateCamera();
}

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => showToast('Fullscreen not available'));
    document.getElementById('fullscreenBtn').classList.add('active');
  } else {
    document.exitFullscreen();
    document.getElementById('fullscreenBtn').classList.remove('active');
  }
}
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) document.getElementById('fullscreenBtn').classList.remove('active');
});

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 4000);
}

// ── Resize ───────────────────────────────────────────────────────────────────
function onResize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize);
onResize();

// ── Render loop ───────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  if (autoRotate) { spherical.theta += autoRotateSpeed; updateCamera(); }
  renderer.render(scene, camera);
}

// ── Init ──────────────────────────────────────────────────────────────────────
updateCamera();
animate();
autoLoadModel();
</script>
</body>
</html>
